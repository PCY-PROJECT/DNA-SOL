function CopyBtn({ text }) {
  const [copied, setCopied] = useState(false);
  const copy = () => { navigator.clipboard.writeText(text); setCopied(true); setTimeout(()=>setCopied(false),2000); };
  return (
    <button onClick={copy} className="shrink-0 px-2 py-1 rounded text-xs font-mono transition-colors border border-sol-border hover:border-sol-green/40 hover:text-sol-green text-slate-500">
      {copied ? '✓ copied' : 'copy'}
    </button>
  );
}

      ))}

}

                  {cmd:'/dna-earnings', desc:'查看总收益、待结算金额、近期结算记录'},
                  {cmd:'/dna-packages', desc:'查看你上传的所有包及各包安装数、收益明细'},
                  {cmd:'dnacloud creator earnings YOUR_WALLET', desc:'CLI 命令查询收益账本（适合脚本化）'},
                  {cmd:'dnacloud creator payouts YOUR_WALLET', desc:'查看历史结算记录和链上 txHash'},
                ].map(item => (
                  <div key={item.cmd} className="space-y-1.5">
                    <div className="flex items-center gap-2 bg-black/40 rounded-xl border border-sol-border px-4 py-2.5 font-mono text-xs">
                      <span className={item.cmd.startsWith('/') ? 'text-sol-purple' : 'text-sol-green'}>
                        {item.cmd.startsWith('/') ? '/' : '$'}
                      </span>
                      <span className="flex-1 text-white">{item.cmd.startsWith('/') ? item.cmd.slice(1) : item.cmd}</span>
                      <CopyBtn text={item.cmd} />
                    </div>
                    <div className="text-xs text-slate-500 pl-1">{item.desc}</div>
                  </div>
                ))}
              </div>
            </div>

            <div className="flex items-start gap-2 p-4 rounded-xl bg-sol-blue/5 border border-sol-blue/20 text-xs text-slate-400">
              <span className="text-sol-blue shrink-0">ℹ</span>
              <span>平台手续费 10%，其余 90% 自动结算。收益结算使用 Solana mainnet USDC（mint: EPjFW...）。</span>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── MiniCard + PkgCard ────────────────────────────────────────────────────────
function MiniCard({ pkg, onClick }) {
  const tagStyle = pkg.tag==='official'
    ? 'border-sol-green/30 text-sol-green bg-sol-green/5'
    : 'border-sol-blue/30 text-sol-blue bg-sol-blue/5';
  return (
    <div onClick={onClick}
      className="glass-card rounded-2xl border border-sol-border p-5 hover:border-sol-purple/40 transition-all cursor-pointer group">
      <div className="flex items-start justify-between mb-3">
        <span className={`text-xs font-mono px-2 py-0.5 rounded border capitalize ${tagStyle}`}>{pkg.tag}</span>
        <span className="text-xs font-mono text-sol-green">{pkg.score}/100</span>
      </div>
      <h3 className="font-bold mb-1 group-hover:text-sol-purple transition-colors">{pkg.name}</h3>
      <p className="text-xs text-slate-500 mb-3 line-clamp-2">{pkg.desc}</p>
      <div className="flex flex-wrap gap-1 mb-3">
        {pkg.capabilities.slice(0,2).map(c=>(
          <span key={c} className="text-xs px-1.5 py-0.5 rounded bg-white/5 text-slate-600 font-mono">{c}</span>
        ))}
      </div>
      <div className="flex items-center justify-between pt-2 border-t border-sol-border">
        <span className="font-bold sol-gradient-text text-sm">{pkg.price} USDC</span>
        <span className="text-xs text-slate-500">{pkg.installs} installs</span>
      </div>
    </div>
  );
}

function PkgCard({ pkg, onSelect }) {
  const tagStyle = pkg.tag==='official'
    ? 'border-sol-green/30 text-sol-green bg-sol-green/5'
    : 'border-sol-blue/30 text-sol-blue bg-sol-blue/5';
  return (
    <div onClick={onSelect}
      className="glass-card rounded-2xl border border-sol-border p-5 hover:border-sol-purple/40 transition-all cursor-pointer group">
      <div className="flex items-start justify-between mb-3">
        <div className="flex items-center gap-2">
          <span className={`text-xs font-mono px-2 py-0.5 rounded border capitalize ${tagStyle}`}>{pkg.tag}</span>
          <span className="text-xs text-slate-500 capitalize">{pkg.domain}</span>
        </div>
        <span className="text-xs font-mono text-sol-green">{pkg.score}/100</span>
      </div>
      <h3 className="font-bold mb-1 group-hover:text-sol-purple transition-colors">{pkg.name}</h3>
      <p className="text-xs text-slate-500 mb-1">by {pkg.author}</p>
      <p className="text-sm text-slate-400 mb-4 line-clamp-2 leading-relaxed">{pkg.desc}</p>
      <div className="flex flex-wrap gap-1 mb-4">
        {pkg.capabilities.slice(0,3).map(c=>(
          <span key={c} className="text-xs px-1.5 py-0.5 rounded bg-white/5 text-slate-500 font-mono">{c}</span>
        ))}
        {pkg.capabilities.length>3 && <span className="text-xs px-1.5 py-0.5 rounded bg-white/5 text-slate-500">+{pkg.capabilities.length-3}</span>}
      </div>
      <div className="flex items-center justify-between pt-3 border-t border-sol-border">
        <div>
          <span className="font-bold sol-gradient-text text-sm">{pkg.price} USDC</span>
          <span className="text-xs text-slate-600 ml-1">/ install</span>
        </div>
        <span className="text-xs text-slate-500">{pkg.installs} installs ›</span>
      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [page, setPage] = useState('home');
  return (
    <div className="min-h-screen bg-grid">
      <Navbar page={page} setPage={setPage}/>
      {page==='home' && <HomePage setPage={setPage}/>}
      {page==='marketplace' && <MarketplacePage/>}
      {page==='creator' && <CreatorPage/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
