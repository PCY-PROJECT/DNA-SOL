server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: ${SERVER_CONTEXT_PATH:}

spring:
  application:
    name: dnacloud-server
  datasource:
    url: ${DB_URL:jdbc:h2:file:./data/dnacloud;DB_CLOSE_ON_EXIT=FALSE}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        dialect: ${JPA_DIALECT:org.hibernate.dialect.H2Dialect}
  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:false}
      path: /h2-console
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

dnacloud:
  base-url: ${DNACLOUD_BASE_URL:http://localhost:8080}
  artifact-store: ${DNACLOUD_ARTIFACT_STORE:./artifacts}
  signing-key: ${DNACLOUD_SIGNING_KEY:}
  platform-fee-rate: ${DNACLOUD_PLATFORM_FEE_RATE:0.20}
  payment-address: ${DNACLOUD_PAYMENT_ADDRESS:}
  minimum-payout: ${DNACLOUD_MINIMUM_PAYOUT:100000}
  local-test-mode: ${DNACLOUD_LOCAL_TEST:false}
  admin-api-key: ${DNACLOUD_ADMIN_API_KEY:}
  treasury-key: ${DNACLOUD_TREASURY_KEY:}
  usdt-contract-address: ${USDT_CONTRACT_ADDRESS:}
  cors:
    allowed-origins: ${DNACLOUD_CORS_ORIGINS:http://localhost:3000,http://localhost:5173}

okx:
  x402:
    api-key: ${OKX_API_KEY:}
    secret-key: ${OKX_SECRET_KEY:}
    passphrase: ${OKX_PASSPHRASE:}
    facilitator-url: ${OKX_X402_FACILITATOR_URL:https://www.okx.com/api/v5/onchainos/x402}

logging:
  level:
    com.okg.dnacloud: INFO
