server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: ${SERVER_CONTEXT_PATH:}

spring:
  application:
    name: dnacloud-server
  datasource:
    url: ${DB_URL:jdbc:h2:file:./data/solDna;DB_CLOSE_ON_EXIT=FALSE}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        dialect: ${JPA_DIALECT:org.hibernate.dialect.H2Dialect}
  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:false}
      path: /h2-console
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

dnacloud:
  base-url: ${DNACLOUD_BASE_URL:http://localhost:8080}
  artifact-store: ${DNACLOUD_ARTIFACT_STORE:./artifacts}
  signing-key: ${DNACLOUD_SIGNING_KEY:}
  platform-fee-rate: ${DNACLOUD_PLATFORM_FEE_RATE:0.20}
  merchant-address: ${DNACLOUD_MERCHANT_ADDRESS:AY5669hoJZMxWnaUGtbefiRj4btzXX5iR8Kh9Mtnc4KV}
  minimum-payout: ${DNACLOUD_MINIMUM_PAYOUT:100000}
  local-test-mode: ${DNACLOUD_LOCAL_TEST:false}
  admin-api-key: ${DNACLOUD_ADMIN_API_KEY:}
  treasury-key: ${DNACLOUD_TREASURY_KEY:}
  cors:
    allowed-origins: ${DNACLOUD_CORS_ORIGINS:http://localhost:3000,http://localhost:5173}

solana:
  rpc-url: ${SOLANA_RPC_URL:https://api.devnet.solana.com}
  network: ${SOLANA_NETWORK:solana-devnet}
  usdc-mint: ${SOLANA_USDC_MINT:4zMMC9srt5Ri5X14GAgXhaHii3GnPAEERYPJgZJDncDU}

logging:
  level:
    com.okg.dnacloud: INFO
